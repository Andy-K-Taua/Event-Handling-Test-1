<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="mainScreen">
        <div id="cubeOne" class="cube">Blue</div>
        <div id="cubeTwo" class="cube">Red</div>
    </main>
    
    <div id="controlPad">
        <button id="leftButton" class="control-btn" aria-label="Set cube two to red"></button>
        <button id="rightButton" class="control-btn" aria-label="Set cube one to blue"></button>
    </div>

    <script src="main.js" defer></script>
</body>
</html>
